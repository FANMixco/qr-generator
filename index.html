<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>QR Code Generator</title>
    <meta
      name="description"
      content="Simple QR code generator. Create and download QR codes as PNG or JPG instantly."
    />
    <meta name="author" content="Federico Navarrete" />

    <!-- Open Graph (basic) -->
    <meta property="og:title" content="QR Code Generator" />
    <meta
      property="og:description"
      content="Generate and download QR codes instantly."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://qr-gen.federiconavarrete.com" />
    <meta property="og:title" content="QR Code Generator by Federico Navarrete" />
    <meta property="og:description" content="Simple QR code generator. Create and download QR codes as PNG or JPG instantly.">
    <meta property="og:image" content="https://qr-gen.federiconavarrete.com/img/preview.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://qr-gen.federiconavarrete.com">
    <meta property="twitter:title" content="QR Code Generator by Federico Navarrete">
    <meta property="twitter:description" content="Simple QR code generator. Create and download QR codes as PNG or JPG instantly.">
    <meta property="twitter:image" content="https://qr-gen.federiconavarrete.com/img/preview.png">    
    <meta name="theme-color" content="#090a0f">

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <link rel="stylesheet" href="css/index.min.css" />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="img/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="img/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="img/favicon-16x16.png"
    />
    <link rel="manifest" href="site.webmanifest" />
  </head>

  <body>
    <div class="page">
      <div class="card">
        <h1>QR Code Generator</h1>
        <p>Paste a link, generate a QR code, and download it as PNG or JPG. No signup needed.</p>

        <div class="input-group">
          <input id="urlInput" type="url" placeholder="https://example.com" />
          <button onclick="generateQR()">Generate</button>
        </div>

        <div class="qr-box">
          <canvas id="qrCanvas"></canvas>
        </div>

        <div id="downloads" class="downloads">
          <a id="downloadPng">Download PNG</a>
          <a id="downloadJpg" class="secondary">Download JPG</a>
        </div>
      </div>

      <footer class="footer">
        <p>
          © <span id="year"></span>
          <a href="https://federiconavarrete.com" target="_blank">
            Federico Navarrete
          </a>
        </p>
      </footer>
    </div>

    <script src="js/index.min.js"></script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "QR Code Generator",
        "url": "https://qr-gen.federiconavarrete.com/",
        "description": "Simple QR code generator. Create and download QR codes as PNG or JPG instantly.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript",
        "author": {
          "@type": "Person",
          "name": "Federico Navarrete",
          "url": "https://federiconavarrete.com"
        },
        "creator": {
          "@type": "Person",
          "name": "Federico Navarrete"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        }
      }
    </script>

    <script src="js/gAnalyticsLoad.min.js"></script>
  </body>
</html>
